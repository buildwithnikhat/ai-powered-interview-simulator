version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: aicos_postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-aicos_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aicos_pass}
      POSTGRES_DB: ${POSTGRES_DB:-aicos_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aicos_user -d aicos_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: aicos_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: aicos_backend
    restart: always
    environment:
      - DATABASE_URL=postgresql+asyncpg://aicos_user:aicos_pass@postgres:5432/aicos_db
      - REDIS_URL=redis://redis:6379/0
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - OLLAMA_MODEL=llama3
      - SECRET_KEY=${SECRET_KEY:-change-in-production}
    ports:
      - "8000:8000"
    volumes:
      - ./backend/audio_uploads:/app/audio_uploads
      - ./backend/chroma_data:/app/chroma_data
      - ./backend/static:/app/static
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: aicos_frontend
    restart: always
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NEXT_PUBLIC_WS_URL=ws://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
