version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: aicos_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: aicos_user
      POSTGRES_PASSWORD: aicos_pass
      POSTGRES_DB: aicos_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aicos_user -d aicos_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: aicos_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
